name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer:
          - layer-1-ingestion
          - layer-2-processing
          - layer-6-signal
          - layer-7-core-interface/api
          - layer-8-presentation-notification/stock-analysis-portal
          - layer-8-presentation-notification/telegram-bot

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 'latest' }

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: ${{ matrix.layer }}/pnpm-lock.yaml

      - name: Install Dependencies
        working-directory: ${{ matrix.layer }}
        run: pnpm install --frozen-lockfile

      - name: Lint (if script exists)
        working-directory: ${{ matrix.layer }}
        run: pnpm run lint --if-present

      - name: Test (if script exists)
        working-directory: ${{ matrix.layer }}
        run: pnpm test --if-present
