name: CI — Tests + Lint

on:
  push:
    branches: [main, nifty-trading-plan]
  pull_request:
    branches: [main]

jobs:
  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer: [layer-1-ingestion, layer-2-processing, layer-6-signal, layer-10-execution]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 'latest' }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm', cache-dependency-path: ${{ matrix.layer }}/pnpm-lock.yaml }
      - name: Install
        run: cd ${{ matrix.layer }} && pnpm install --frozen-lockfile
      - name: Test
        run: cd ${{ matrix.layer }} && pnpm test

  test-go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer: [layer-4-analysis, layer-5-aggregation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Test
        run: cd ${{ matrix.layer }} && go test ./... -v -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 'latest' }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec eslint . --ext .js,.ts,.tsx || echo "Lint warnings — non-blocking"
