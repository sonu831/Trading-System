name: CI — Tests + Lint

on:
  push:
    branches: [main, nifty-trading-plan]
  pull_request:
    branches: [main]

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: cd layer-1-ingestion && npm ci && npm test
      - run: cd layer-2-processing && npm ci && npm test
      - run: cd layer-6-signal && npm ci && npm test
      - run: cd layer-7-core-interface/api && npm ci --legacy-peer-deps
      - run: cd layer-10-execution && npm ci && npm test

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - run: cd layer-4-analysis && go test ./... -v -count=1
      - run: cd layer-5-aggregation && go test ./... -v -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm run lint

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: golangci/golangci-lint-action@v6
        with: { version: latest, args: --timeout 3m }
        working-directory: layer-4-analysis
