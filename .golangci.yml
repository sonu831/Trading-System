linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - nilerr
    - unconvert
    - bodyclose
    - noctx
  disable-all: true
run:
  timeout: 3m
  go: '1.21'
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
