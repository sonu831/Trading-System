<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { Modal, ModalHeader, ModalBody, ModalFooter, Button } = window.AutoTrading_f56db4;
function Demo() {
  const [open, setOpen] = React.useState(true);
  return (
    <div>
      <Button onClick={() => setOpen(true)}>Open modal</Button>
      <Modal isOpen={open} onClose={() => setOpen(false)}>
        <ModalHeader onClose={() => setOpen(false)}>Halt all trading?</ModalHeader>
        <ModalBody>No new entries will be taken; open positions square off at market.</ModalBody>
        <ModalFooter><Button variant="secondary" onClick={() => setOpen(false)}>Cancel</Button><Button variant="danger">Halt</Button></ModalFooter>
      </Modal>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
