<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Slate scale — backgrounds, surfaces, borders, text" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--color-background);font-family:var(--font-sans);}
  .row{display:flex;gap:12px;}
  .sw{flex:1;height:80px;border-radius:var(--radius-lg);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:11px;font-family:var(--font-mono);border:1px solid var(--color-border);}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-background);color:var(--color-text-primary)">--color-background</div>
  <div class="sw" style="background:var(--color-surface);color:var(--color-text-primary)">--color-surface</div>
  <div class="sw" style="background:var(--color-surface-hover);color:var(--color-text-primary)">--color-surface-hover</div>
  <div class="sw" style="background:var(--color-text-primary);color:var(--color-background)">--color-text-primary</div>
  <div class="sw" style="background:var(--color-text-secondary);color:var(--color-background)">--color-text-secondary</div>
  <div class="sw" style="background:var(--color-text-tertiary);color:var(--color-background)">--color-text-tertiary</div>
</div>
</body></html>
