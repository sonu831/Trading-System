<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Success · Error · Warning · Info" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--color-background);font-family:var(--font-sans);}
  .row{display:flex;gap:12px;}
  .sw{flex:1;height:80px;border-radius:var(--radius-lg);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;font-size:12px;font-family:var(--font-mono);}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-success)">--color-success</div>
  <div class="sw" style="background:var(--color-error)">--color-error</div>
  <div class="sw" style="background:var(--color-warning)">--color-warning</div>
  <div class="sw" style="background:var(--color-info)">--color-info</div>
</div>
</body></html>
