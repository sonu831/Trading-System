<!-- @dsCard group="Colors" viewport="700x220" name="Light vs Dark theme" subtitle="Same tokens, [data-theme=&quot;dark&quot;] scope" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:#ccc;font-family:var(--font-sans);display:flex;gap:12px;}
  .panel{flex:1;border-radius:var(--radius-xl);padding:16px;background:var(--color-background);color:var(--color-text-primary);}
  .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:12px;margin-top:8px;}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-tertiary);}
</style></head>
<body>
  <div class="panel"><div class="lbl">Light (default)</div><div class="card"><b style="color:var(--color-primary)">Primary text</b><div style="color:var(--color-text-secondary);font-size:13px">Secondary copy on a surface card.</div></div></div>
  <div class="panel" data-theme="dark"><div class="lbl">Dark</div><div class="card"><b style="color:var(--color-primary)">Primary text</b><div style="color:var(--color-text-secondary);font-size:13px">Secondary copy on a surface card.</div></div></div>
</body></html>
