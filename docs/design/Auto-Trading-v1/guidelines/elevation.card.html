<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">

<body>
  <div class="box" style="box-shadow:var(--shadow-md)">shadow-md</div>
  <div class="box" style="box-shadow:var(--shadow-lg)">shadow-lg</div>
  <div class="box" style="box-shadow:var(--shadow-2xl)">shadow-2xl</div>
</body></html>
