<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.js"></script>
<style>
  body{margin:0;padding:16px;background:var(--color-background);font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:12px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--color-text-secondary);font-size:10px;}
  [data-lucide]{width:22px;height:22px;color:var(--color-primary);}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><i data-lucide="zap"></i>zap</div>
    <div class="cell"><i data-lucide="x-octagon"></i>x-octagon</div>
    <div class="cell"><i data-lucide="play"></i>play</div>
    <div class="cell"><i data-lucide="shield-check"></i>shield-check</div>
    <div class="cell"><i data-lucide="shield-alert"></i>shield-alert</div>
    <div class="cell"><i data-lucide="trending-up"></i>trending-up</div>
    <div class="cell"><i data-lucide="trending-down"></i>trending-down</div>
    <div class="cell"><i data-lucide="flask-conical"></i>flask-conical</div>
    <div class="cell"><i data-lucide="eye"></i>eye</div>
    <div class="cell"><i data-lucide="database"></i>database</div>
    <div class="cell"><i data-lucide="key"></i>key</div>
    <div class="cell"><i data-lucide="layers"></i>layers</div>
    <div class="cell"><i data-lucide="activity"></i>activity</div>
    <div class="cell"><i data-lucide="layout-dashboard"></i>layout-dashboard</div>
    <div class="cell"><i data-lucide="check-circle-2"></i>check-circle-2</div>
    <div class="cell"><i data-lucide="loader-2"></i>loader-2</div>
    <div class="cell"><i data-lucide="bar-chart-2"></i>bar-chart-2</div>
    <div class="cell"><i data-lucide="help-circle"></i>help-circle</div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
