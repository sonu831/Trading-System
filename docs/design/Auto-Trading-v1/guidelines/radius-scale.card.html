<!-- @dsCard group="Spacing" viewport="700x150" name="Radius scale" subtitle="md/lg/xl/full — cards use xl" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--color-background);font-family:var(--font-sans);font-size:12px;color:var(--color-text-tertiary);display:flex;gap:16px;}
.box{width:80px;height:80px;background:var(--color-surface);border:2px solid var(--color-primary);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;}
</style></head>
<body>
  <div class="box" style="border-radius:var(--radius-md)">md 6px</div>
  <div class="box" style="border-radius:var(--radius-lg)">lg 8px</div>
  <div class="box" style="border-radius:var(--radius-xl)">xl 12px</div>
  <div class="box" style="border-radius:var(--radius-full)">full</div>
</body></html>
