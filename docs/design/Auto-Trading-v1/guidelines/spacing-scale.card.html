<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base unit, Tailwind-derived" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--color-background);font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);}
.row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bar{background:var(--color-primary);height:14px;border-radius:2px;}
</style></head>
<body>
  <div class="row"><div class="bar" style="width:var(--space-1)"></div>4px</div>
  <div class="row"><div class="bar" style="width:var(--space-2)"></div>8px</div>
  <div class="row"><div class="bar" style="width:var(--space-3)"></div>12px</div>
  <div class="row"><div class="bar" style="width:var(--space-4)"></div>16px</div>
  <div class="row"><div class="bar" style="width:var(--space-6)"></div>24px</div>
  <div class="row"><div class="bar" style="width:var(--space-8)"></div>32px</div>
</body></html>
