services:
  # ===========================================
  # APPLICATION LAYERS (L1-L6 + L7 API)
  # ===========================================

  # Layer 1: Ingestion
  # Note: Application-level health checks wait for Kafka/Redis (see shared/health-check)
  ingestion:
    build:
      context: ../../layer-1-ingestion
      dockerfile: Dockerfile
    container_name: ingestion
    ports:
      - '9101:9101' # Metrics endpoint
    environment:
      - INGESTION_PORT=9101
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC_RAW_TICKS=raw-ticks
      - REDIS_URL=redis://redis:6379
      - BACKEND_API_URL=http://backend-api:4000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - MARKET_DATA_PROVIDER=${MARKET_DATA_PROVIDER:-kite}
      - SKIP_HISTORICAL_SYNC=false
      - SWARM_CONCURRENCY=${SWARM_CONCURRENCY:-12}
      - FORCE_HISTORICAL_MODE=${FORCE_HISTORICAL_MODE:-false}
      - KAFKA_TOPIC_OPTION_CHAIN=option-chain
      - OPTION_CHAIN_POLL_INTERVAL_MS=${OPTION_CHAIN_POLL_INTERVAL_MS:-3000}
      - OPTION_UNDERLYING=${OPTION_UNDERLYING:-NIFTY}
    volumes:
      - ../../shared:/app/shared:ro
    networks:
      - trading-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 1G

  # Layer 1: FlatTrade Python Ingestion (Sidecar)
  flattrade-ingestion:
    build:
      context: ../../layer-1-flattrade-python
      dockerfile: Dockerfile
    container_name: flattrade-ingestion
    environment:
      - KAFKA_BROKERS=kafka:29092
      - FLATTRADE_USER_ID=${FLATTRADE_USER_ID}
      - FLATTRADE_API_KEY=${FLATTRADE_API_KEY}
      - FLATTRADE_API_SECRET=${FLATTRADE_API_SECRET}
      - FLATTRADE_ACTID=${FLATTRADE_ACTID}
      - FLATTRADE_PASSWORD=${FLATTRADE_PASSWORD}
    networks:
      - trading-network
    restart: unless-stopped
    profiles:
      - flattrade

  # Layer 2: Processing
  # Note: Application-level health checks wait for Kafka/Redis/TimescaleDB (see shared/health-check)
  processing:
    build:
      context: ../../layer-2-processing
      dockerfile: Dockerfile
    container_name: processing
    ports:
      - '3002:3002' # Metrics endpoint
    environment:
      - PORT=3002
      - KAFKA_BROKERS=kafka:29092
      - REDIS_URL=redis://redis:6379
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading123}@timescaledb:5432/${POSTGRES_DB:-nifty50}
    volumes:
      - ../../shared:/app/shared:ro
    networks:
      - trading-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 6GB
        reservations:
          memory: 2G

  # Layer 4: Analysis Engine (Go)
  analysis:
    build:
      context: ../../layer-4-analysis
      dockerfile: Dockerfile
    container_name: analysis
    ports:
      - '8081:8081'
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading123}@timescaledb:5432/${POSTGRES_DB:-nifty50}
    volumes:
      - ../../vendor:/app/vendor:ro
    networks:
      - trading-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # Layer 5: Aggregation (Go)
  aggregation:
    build:
      context: ../../layer-5-aggregation
      dockerfile: Dockerfile
    container_name: aggregation
    ports:
      - '8080:8080'
    environment:
      - REDIS_URL=redis://redis:6379
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading123}@timescaledb:5432/${POSTGRES_DB:-nifty50}
    networks:
      - trading-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Layer 6: Signal Generation
  signal:
    build:
      context: ../../layer-6-signal
      dockerfile: Dockerfile
    container_name: signal
    ports:
      - '8082:8082'
    environment:
      - REDIS_URL=redis://redis:6379
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading123}@timescaledb:5432/${POSTGRES_DB:-nifty50}
      - KAFKA_BROKERS=kafka:29092
      - REGIME_POLL_INTERVAL_MS=${REGIME_POLL_INTERVAL_MS:-60000}
      - REGIME_SYMBOL=${REGIME_SYMBOL:-NIFTY}
    volumes:
      - ../../shared:/app/shared:ro
    networks:
      - trading-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Layer 7: Core Interface (API)
  backend-api:
    build:
      context: ../../layer-7-core-interface/api
      dockerfile: Dockerfile
    container_name: backend-api
    # Bound to loopback ON PURPOSE. This API can return decrypted broker credentials and
    # halt live trading; '4000:4000' published it on every host interface (LAN + any port
    # forward). Containers still reach it as backend-api:4000 over trading-network.
    # To expose it publicly, front it with a TLS reverse proxy — never bind 0.0.0.0 here.
    ports:
      - '127.0.0.1:4000:4000'
    environment:
      - REDIS_URL=redis://redis:6379
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading123}@timescaledb:5432/${POSTGRES_DB:-nifty50}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading123}@timescaledb:5432/${POSTGRES_DB:-nifty50}
      - CREDENTIAL_MASTER_KEY=${CREDENTIAL_MASTER_KEY}
      # API is default-deny; L7 refuses to start without this key.
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - DASHBOARD_ORIGINS=${DASHBOARD_ORIGINS:-http://localhost:3000}
      # Layer 10 execution engine (positions, risk, kill switch). Port must match the
      # `execution` service's PORT (8095). No depends_on: the API must start even when
      # the engine is down and report it as offline.
      - EXECUTION_URL=http://execution:8095
    volumes:
      - ../../layer-7-core-interface/api/src:/app/src
      - ../../shared:/app/shared:ro
    networks:
      - trading-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G

  # Layer 9: AI Inference Service (Python/PyTorch)
  ai-inference:
    build:
      context: ../../layer-9-ai-service
      dockerfile: Dockerfile
    container_name: ai-inference
    ports:
      - '8000:8000'
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
    networks:
      - trading-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 16G

  # Ollama (Local LLM)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ../../data/ollama:/root/.ollama
    networks:
      - trading-network
    restart: unless-stopped

  # Layer 10: Execution Engine
  execution:
    build:
      context: ../../layer-10-execution
      dockerfile: Dockerfile
    container_name: execution
    ports:
      - '8095:8095'
    environment:
      - PORT=8095
      - TRADE_MODE=${TRADE_MODE:-paper}
      - EXECUTION_BROKER=${EXECUTION_BROKER:-flattrade}
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC_TRADE_SIGNALS=trade-signals
      - REDIS_URL=redis://redis:6379
      - TIMESCALE_URL=postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading123}@timescaledb:5432/${POSTGRES_DB:-nifty50}
      - BACKEND_API_URL=http://backend-api:4000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - UNDERLYING=${UNDERLYING:-NIFTY}
      - MAX_LOTS=${MAX_LOTS:-1}
      - MAX_CONCURRENT_POSITIONS=1
      - MAX_TRADES_PER_DAY=5
      - MAX_DAILY_LOSS=2500
    volumes:
      # Rule 3 (shared-tier dedup) was unachievable here: without this mount L10 cannot
      # `require('/app/shared/constants')`, so it re-declared broker URLs, ports and the
      # expiry weekday locally — and they drifted.
      - ../../shared:/app/shared:ro
    networks:
      - trading-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M

  # Layer 8: API Gateway
  gateway:
    build:
      context: ../../infrastructure/gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - '80:80'
    depends_on:
      backend-api:
        condition: service_healthy
    networks:
      - trading-network
    restart: unless-stopped

  # Layer 8: Dashboard
  dashboard:
    build:
      context: ../../layer-8-presentation-notification/stock-analysis-portal
      dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_WS_URL=/
      # Server-side only (NOT NEXT_PUBLIC_*): src/middleware.ts injects this into the
      # proxied /api/* requests. Exposing it to the browser would hand over the control plane.
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    networks:
      - trading-network
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../../shared:/app/shared:ro

# ===========================================
# NETWORKS (External - shared with infra)
# ===========================================
networks:
  trading-network:
    external: true
    name: local-trading-network
