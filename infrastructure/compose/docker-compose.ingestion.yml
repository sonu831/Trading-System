version: '3.8'

services:
  # Boost Ingestion Layer resources
  ingestion:
    deploy:
      resources:
        limits:
          cpus: '2.0' # Increased from 0.25 to 2.0 (Full Dual Core access)
          memory: 4G # Increased from 2G to 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Boost Processing Layer resources
  processing:
    deploy:
      resources:
        limits:
          cpus: '4.0' # Allow heavy processing
          memory: 8G # Increased from 6G to 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # Optimize TimescaleDB for Bulk Ingestion
  timescaledb:
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=8GB
      - -c
      - effective_cache_size=10GB
      - -c
      - work_mem=128MB
      - -c
      - maintenance_work_mem=2GB
      - -c
      - max_wal_size=8GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.0
      - -c
      - effective_io_concurrency=300
      - -c
      - wal_buffers=64MB
      - -c
      - default_statistics_target=500
      - -c
      - max_worker_processes=8
      - -c
      - max_parallel_workers_per_gather=4
      - -c
      - max_parallel_workers=8
      - -c
      - max_parallel_maintenance_workers=4
      - -c
      - synchronous_commit=off # 🚀 ULTRA SPEED: No disk wait per insert
      - -c
      - wal_writer_delay=200ms
      - -c
      - wal_compression=on
      - -c
      - commit_delay=10000
      - -c
      - checkpoint_timeout=30min
      - -c
      - autovacuum_naptime=10min
      - -c
      - jit=on
    deploy:
      resources:
        limits:
          cpus: '8.0' # Max possible
          memory: 16G # Allow full utilization
        reservations:
          cpus: '2.0'
          memory: 4G

  # Backend API needs to handle status updates quickly
  backend-api:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 12G # Keep high memory
        reservations:
          cpus: '1.0'
          memory: 4G

  # Analysis Service (Layer 4) - Required for API Queries
  analysis:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
