# pnpm >= 11 reads dependency build-script approvals from here.
# The `pnpm` field in package.json is no longer read, and `onlyBuiltDependencies` was
# replaced by this `allowBuilds` map. Without it `pnpm install` exits 1 with
# ERR_PNPM_IGNORED_BUILDS, which fails the Docker build and every CI job.
allowBuilds:
  esbuild: true
  unrs-resolver: true
