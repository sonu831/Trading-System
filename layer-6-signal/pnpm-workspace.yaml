# pnpm >= 11 reads dependency build-script approvals from here.
# The `pnpm` field in package.json is NO LONGER READ (pnpm warns and ignores it), and
# `onlyBuiltDependencies` has been replaced by this `allowBuilds` map.
#
# esbuild (pulled in by tsx) and unrs-resolver ship native binaries and need their
# postinstall scripts. Without this file `pnpm install` exits 1 with
# ERR_PNPM_IGNORED_BUILDS, which fails the Docker build and every CI job.
allowBuilds:
  esbuild: true
  unrs-resolver: true
